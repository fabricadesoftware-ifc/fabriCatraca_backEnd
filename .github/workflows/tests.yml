name: tests

on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
      - "docs/**"
      - ".vscode/**"
      - "**/*.svg"
      - "**/*.png"
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-24.04
    env:
      DJANGO_SETTINGS_MODULE: src.django_project.settings.test
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

