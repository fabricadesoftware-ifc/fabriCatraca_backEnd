name: 'deploy'

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'docs/**'
      - '.vscode/**'
      - '.github/**'
      - '**/*.svg'
      - '**/*.png'

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Cloning repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Push to dokku
        uses: dokku/github-action@master
        with:
          git_remote_url: 'ssh://dokku@app1.fabricadesoftware.ifc.edu.br:1022/catraca-api'
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          branch: master